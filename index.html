<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushroom Hunter</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/ui.css">
</head>
<body>
    <div id="game-container" class="log-open">
        <div class="btn-settings" id="btn-settings-gear" title="Settings">⚙️</div>
        <div id="ui">
            <div class="ui-stats">
                <div class="stat-badge"><span class="stat-label">⭐ Score:</span> <span id="score" class="stat-value">0</span></div>
                <div class="stat-badge"><span class="stat-label">🏆 High:</span> <span id="high-score" class="stat-value">0</span></div>
                <div class="stat-badge"><span class="stat-label">🪙</span> <span id="coins" class="stat-value">0</span></div>
                <div class="stat-badge"><span class="stat-label">🪨</span> <span id="stones" class="stat-value">0</span></div>
            </div>
            <div class="ui-hints">
                <div><span id="hint-jump" class="key-hl">SPACE / ↑</span> Jump</div>
                <div><span id="hint-buy" class="key-hl">B</span> Buy 10🪨 / 100🪙</div>
                <div><span id="hint-throw" class="key-hl">Z/X</span> to throw</div>
                <div><span id="hint-fs" class="key-hl">F</span> Fullscreen</div>
                <div><span id="hint-log" class="key-hl">P</span> Toggle Log</div>
                <div><span id="hint-rules" class="key-hl">R</span> Rules</div>
            </div>
        </div>

        <div id="game-over" style="display: none;">
            <h1 id="status-text">Game Over!</h1>
            <p>Your score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal-overlay">
            <div class="modal-content">
                <span class="close-modal" id="close-settings">&times;</span>
                <h2>⚙️ Game Settings</h2>

                <div class="settings-grid">
                    <div class="setting-item">
                        <span class="setting-label">🎵 Music</span>
                        <div class="setting-control">
                            <span id="music-icon" style="cursor:pointer; font-size: 20px;">🎵</span>
                            <input id="music-volume" type="range" min="0" max="100" value="55">
                        </div>
                    </div>

                    <div class="setting-item">
                        <span class="setting-label">📳 Haptics</span>
                        <button id="vibration-toggle" class="setting-btn-toggle">ENABLED</button>
                    </div>

                    <div class="setting-item">
                        <span class="setting-label">🎨 Dynamic Environments</span>
                        <button id="dynamic-ui-toggle" class="setting-btn-toggle">ON</button>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 20px;">
                    <button id="back-to-game">Back to Game</button>
                </div>
            </div>
        </div>
        <!-- Rules Modal -->
        <div id="rules-modal" class="modal-overlay">
            <div class="modal-content">
                <span class="close-modal" id="close-rules">&times;</span>
                <h2>📜 Quest Rules & Rewards</h2>
                <div id="rules-content">
                    <p style="text-align: center; opacity: 0.6; margin-top: 20px;">Rules content coming soon...</p>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button id="rules-back-to-game">Back to Game</button>
                </div>
            </div>
        </div>

        <div id="view-stack">
            <canvas id="gameCanvas"></canvas>
            <div id="log-panel">
                <div id="event-panel"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
